<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
 <link rel="stylesheet" href="https://fontawesome.com">
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>
<body>
  <main>
  <div class="logo">
    <img class="logo-img" src="./images/logo.svg" alt="">
  </div>
  <div class="build">
    <div class="mock-img"><img class="ill -image" src="./images/illustration-mockups.svg" alt="illustration-mockups"></div>
    <div class="community">
      <h1 class="community-head">
        Build The Community Your Fans Will Love
      </h1> 
      <p id="community-text">
        Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
        Create connections with your users as you engage in genuine discussion. 
      </p>
      <button onclick="alert('Registered!')" id="register">Register</button> 
    </div>
  </div>
  <div class="socials">
    <div class="bg">
      <i class="fa-brands fa-facebook-f"></i>
    </div>
    <div class="bg">
      <i class=" fa-brands fa-twitter"></i>
    </div>
    <div class="bg">
      <i class="fa-brands fa-instagram"></i>
    </div>
  </div>
  </main>
  <script src="https://kit.fontawesome.com/f0bbabef82.js" crossorigin="anonymous"></script>
</body>
</html>
